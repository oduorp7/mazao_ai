name: Mazao AI Deploy Pipeline

on:
  push:
    branches: [ main ]

jobs:
  lint:
    name: Gate 1 & 2: Static Analysis & Import Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyflakes python-dotenv httpx aiohttp python-telegram-bot
          # No full requirements.txt install to keep gate fast (<10s)

      - name: Run Pre-Deploy Checks
        run: bash scripts/pre_deploy_check.sh

  deploy:
    name: Gate 3 & 4: Production Deploy
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --strategy rolling -e GIT_HASH=${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
