# fly.toml — Mazao AI Configuration
app = "mazao-ai"
primary_region = "ams" # Closest stable region if nbo isn't available

[build]
  dockerfile = "Dockerfile"

[env]
  # Non-sensitive environment variables
  PYTHONPATH = "/app:/app/apps:/app/apps/agent"
  TZ = "Africa/Nairobi"
  FLY_APP_URL = "https://mazao-ai.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "10s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
